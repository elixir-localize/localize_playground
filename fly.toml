# fly.toml — Fly.io deployment configuration for Localize Playground.
#
# Deploy with:
#   fly deploy
#   fly secrets set SECRET_KEY_BASE=$(mix phx.gen.secret)

app = 'localize-playground'
primary_region = 'iad'
kill_signal = 'SIGTERM'

[build]
  # Large builder for CLDR data + gettext compilation across 25 locales.
  # The split_module_by: [:locale] option in gettext.ex helps, but CLDR
  # data compilation in the localize dep is still memory-hungry.
  vm_size = 'performance-4x'

[env]
  PHX_HOST = 'localize-playground.fly.dev'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

# Runtime VM — the app is read-heavy (no DB, no background jobs) so a
# small shared-cpu machine with enough RAM for CLDR data is fine.
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
